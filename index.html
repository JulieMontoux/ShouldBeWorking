<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShouldBeWorking 🎯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* US-02 : Compteur total central */
        .total-counter-section {
            text-align: center;
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .total-counter-label {
            color: white;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .total-counter-value {
            color: white;
            font-size: 5em;
            font-weight: bold;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            line-height: 1;
            transition: all 0.3s ease;
        }

        /* Animation quand le compteur augmente */
        .total-counter-value.bump {
            animation: bump 0.4s ease;
        }

        @keyframes bump {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .total-counter-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1em;
            margin-top: 10px;
            font-style: italic;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .site-button {
            background: white;
            border: 3px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
            font-weight: bold;
            color: #667eea;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .site-button:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .site-button:active {
            transform: translateY(-2px);
        }

        .site-button .emoji {
            font-size: 2em;
        }

        .site-counter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.9em;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            min-width: 30px;
        }

        .site-button:hover .site-counter {
            background: white;
            color: #667eea;
        }

        /* Couleurs psychédéliques */
        .psycho-color-1 {
            background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%) !important;
        }

        .psycho-color-2 {
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%) !important;
        }

        .psycho-color-3 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important;
        }

        .psycho-color-4 {
            background: linear-gradient(135deg, #ffd140 0%, #ff6b6b 100%) !important;
        }

        .psycho-color-5 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%) !important;
        }

        .psycho-color-6 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%) !important;
        }

        .psycho-color-7 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%) !important;
        }

        .psycho-color-8 {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%) !important;
        }

        .psycho-color-9 {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%) !important;
        }

        .psycho-color-10 {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%) !important;
        }

        /* US-03 : Styles pour la section statistiques */
        .stats-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stats-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.8em;
        }

        .stats-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 0.95em;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .stats-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stats-table th {
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .stats-table td {
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .stats-table tbody tr {
            transition: all 0.2s ease;
        }

        .stats-table tbody tr:hover {
            background: #f1f3f5;
            transform: translateX(5px);
        }

        .site-name {
            font-weight: 600;
            color: #333;
            font-size: 1.05em;
        }

        .count-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            min-width: 40px;
            text-align: center;
        }

        .percentage {
            color: #667eea;
            font-weight: 600;
            font-size: 1.05em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .total-counter-value {
                font-size: 3.5em;
            }

            .buttons-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-section {
                padding: 20px;
            }

            .stats-table {
                font-size: 0.9em;
            }

            .stats-table th,
            .stats-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ShouldBeWorking 🎯</h1>
        <p class="subtitle">Un compteur de procrastination qui te rappelle gentiment que tu devrais bosser</p>

        <!-- US-02 : Compteur total central -->
        <div class="total-counter-section">
            <div class="total-counter-label">Total Procrastinations</div>
            <div class="total-counter-value" id="total-counter">0</div>
            <div class="total-counter-subtitle">Bravo, tu es un champion 🏆</div>
        </div>

        <!-- US-01 : Boutons pour comptabiliser les procrastinations -->
        <div class="buttons-grid">
            <button class="site-button" onclick="addProcrastination('YouTube')">
                <span class="emoji">📺</span>
                <span>YouTube</span>
                <span class="site-counter" id="counter-YouTube">0</span>
            </button>
            <button class="site-button" onclick="addProcrastination('Twitter/X')">
                <span class="emoji">🐦</span>
                <span>Twitter/X</span>
                <span class="site-counter" id="counter-Twitter/X">0</span>
            </button>
            <button class="site-button" onclick="addProcrastination('Reddit')">
                <span class="emoji">🤖</span>
                <span>Reddit</span>
                <span class="site-counter" id="counter-Reddit">0</span>
            </button>
            <button class="site-button" onclick="addProcrastination('Instagram')">
                <span class="emoji">📷</span>
                <span>Instagram</span>
                <span class="site-counter" id="counter-Instagram">0</span>
            </button>
            <button class="site-button" onclick="addProcrastination('TikTok')">
                <span class="emoji">🎵</span>
                <span>TikTok</span>
                <span class="site-counter" id="counter-TikTok">0</span>
            </button>
            <button class="site-button" onclick="addProcrastination('Facebook')">
                <span class="emoji">👥</span>
                <span>Facebook</span>
                <span class="site-counter" id="counter-Facebook">0</span>
            </button>
        </div>

        <!-- US-03 : Statistiques détaillées par site -->
        <div class="stats-section">
            <h3>📊 Statistiques détaillées</h3>
            <p class="stats-subtitle">Découvre quel réseau social te distrait le plus</p>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Site</th>
                        <th>Visites</th>
                        <th>Pourcentage</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                    <!-- Les lignes seront générées dynamiquement par JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Données de procrastination
        const procrastinationData = {
            'YouTube': 0,
            'Twitter/X': 0,
            'Reddit': 0,
            'Instagram': 0,
            'TikTok': 0,
            'Facebook': 0
        };

        // US-02 : Fonction pour calculer le total
        function getTotalProcrastinations() {
            return Object.values(procrastinationData).reduce((sum, count) => sum + count, 0);
        }

        // US-02 : Fonction pour mettre à jour le compteur total
        function updateTotalCounter() {
            const totalElement = document.getElementById('total-counter');
            const total = getTotalProcrastinations();
            
            // Animation "bump" quand le compteur change
            totalElement.classList.remove('bump');
            void totalElement.offsetWidth; // Force reflow pour réinitialiser l'animation
            totalElement.classList.add('bump');
            
            // Mise à jour du nombre
            totalElement.textContent = total;
        }

        // US-03 : Fonction pour mettre à jour les statistiques détaillées
        function updateStats() {
            const total = getTotalProcrastinations();
            const sites = ['YouTube', 'Twitter/X', 'Reddit', 'Instagram', 'TikTok', 'Facebook'];
            const emojis = {
                'YouTube': '📺',
                'Twitter/X': '🐦',
                'Reddit': '🤖',
                'Instagram': '📷',
                'TikTok': '🎵',
                'Facebook': '👥'
            };

            const statsBody = document.getElementById('stats-body');
            statsBody.innerHTML = '';

            sites.forEach(site => {
                const count = procrastinationData[site];
                const percentage = total > 0 ? Math.round((count / total) * 100) : 0;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="site-name">${emojis[site]} ${site}</td>
                    <td><span class="count-badge">${count}</span></td>
                    <td><span class="percentage">${percentage}%</span></td>
                `;
                statsBody.appendChild(row);
            });
        }

        // US-01 : Fonction pour ajouter une procrastination
        function addProcrastination(site) {
            procrastinationData[site]++;
            
            // Mettre à jour le compteur visuel du bouton
            document.getElementById(`counter-${site}`).textContent = procrastinationData[site];
            
            // US-02 : Mettre à jour le compteur total
            updateTotalCounter();

            // US-03 : Mettre à jour les statistiques
            updateStats();
            
            // Changer aléatoirement la couleur du bouton cliqué
            const button = event.currentTarget;
            const randomColor = Math.floor(Math.random() * 10) + 1;
            
            // Retirer toutes les classes psycho précédentes
            for (let i = 1; i <= 10; i++) {
                button.classList.remove(`psycho-color-${i}`);
            }
            
            // Ajouter la nouvelle couleur
            button.classList.add(`psycho-color-${randomColor}`);
            
            console.log(`Procrastination ajoutée sur ${site}. Total: ${procrastinationData[site]}`);
            console.log(`Total général: ${getTotalProcrastinations()}`);
        }

        // Initialiser les statistiques au chargement de la page
        updateStats();
    </script>
</body>
</html>
